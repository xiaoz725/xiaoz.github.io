<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的个人网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 渐变粉色背景 */
        body {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: "Microsoft YaHei", sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* 背景渐变动画 */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 闪粉星光画布 */
        #sparkles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* 欢迎文字 */
        .welcome {
            font-size: 48px;
            color: white;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            margin-bottom: 40px;
            text-align: center;
            animation: fadeIn 2s ease;
            z-index: 10;
        }

        /* 点击按钮 */
        .enter-btn {
            padding: 18px 50px;
            font-size: 22px;
            background: white;
            color: #ff5e96;
            border-radius: 50px;
            border: none;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: all 0.3s;
            z-index: 10;
        }

        .enter-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 35px rgba(255, 255, 255, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
    <!-- 闪粉效果 -->
    <canvas id="sparkles"></canvas>

    <!-- 欢迎文字 -->
    <div class="welcome">欢迎来到我的个人网站</div>

    <!-- 点击进入按钮 -->
    <button class="enter-btn" onclick="goNext()">点击进入主页</button>

    <script>
        // ===================== 闪粉星光特效 =====================
        const canvas = document.getElementById('sparkles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let sparks = [];
        function createSpark() {
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 3 + 0.5,
                opacity: Math.random(),
                speed: Math.random() * 0.5 + 0.2
            };
        }

        for (let i = 0; i < 120; i++) sparks.push(createSpark());

        function drawSparkles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let s of sparks) {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                ctx.fill();
                s.y += s.speed;
                if (s.y > canvas.height) s.y = 0;
            }
            requestAnimationFrame(drawSparkles);
        }
        drawSparkles();

        // ===================== 点击跳转 =====================
        function goNext() {
            document.querySelector('.welcome').innerText = "正在进入…";
            setTimeout(() => {
                // 跳转到第二页
                window.location.href = "home.html";
            }, 800);
        }
    </script>
</body>
</html>

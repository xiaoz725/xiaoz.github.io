<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>余恩瑶我爱你</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: "Microsoft YaHei", sans-serif;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #sparkles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .love-text {
            font-size: 46px;
            color: white;
            font-weight: bold;
            text-shadow: 0 0 25px rgba(255,255,255,0.9);
            margin-bottom: 40px;
            text-align: center;
            z-index: 10;
            animation: fadeIn 2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .enter-btn {
            padding: 18px 50px;
            font-size: 22px;
            background: white;
            color: #ff5e96;
            border-radius: 50px;
            border: none;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: all 0.3s;
            z-index: 10;
        }

        .enter-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 35px rgba(255, 255, 255, 1);
        }
    </style>
</head>

<body>
    <audio id="bgMusic" loop autoplay>
        <source src="https://webfs.yun.kugou.com/202506011032/4b772991291232299999999999999999/128/part/0/9/09090909090909090909090909090909.mp3" type="audio/mpeg">
    </audio>

    <canvas id="sparkles"></canvas>

    <div class="love-text">余恩瑶我爱你</div>

    <button class="enter-btn" onclick="goNext()">点击进入主页</button>

    <script>
        window.addEventListener('click', function() {
            document.getElementById('bgMusic').play();
        }, { once: true });

        const canvas = document.getElementById('sparkles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let sparks = [];
        function createSpark() {
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 3 + 0.5,
                opacity: Math.random(),
                speed: Math.random() * 0.5 + 0.2
            };
        }

        for (let i = 0; i < 150; i++) sparks.push(createSpark());

        function drawSparkles() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            for (let s of sparks) {
                ctx.beginPath();
                ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
                ctx.fillStyle = `rgba(255,255,255,${s.opacity})`;
                ctx.fill();
                s.y += s.speed;
                if (s.y > canvas.height) s.y = 0;
            }
            requestAnimationFrame(drawSparkles);
        }
        drawSparkles();

        function goNext() {
            document.querySelector('.love-text').innerText = "正在进入…";
            setTimeout(() => {
                window.location.href = "home.html";
            }, 800);
        }
    </script>
</body>
</html>
